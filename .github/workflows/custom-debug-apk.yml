name: Build Custom Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/custom-debug-apk.yml"
      - "app/**"
      - "buildSrc/**"
      - "color/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build arm64 generic debug APK
        run: ./gradlew --no-daemon :app:assembleGenericDebug -PnoSplits -PABI_FILTERS=arm64-v8a

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: myseal-custom-arm64-debug-apk
          path: app/build/outputs/apk/generic/debug/*arm64*.apk
          if-no-files-found: error
          retention-days: 14
